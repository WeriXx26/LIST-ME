<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4A90E2">
    <title>LIST'ME</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <h1>LIST'ME</h1>
        <div class="nav-links">
            <button onclick="showPage('tasks')">Tâches</button>
            <button onclick="showPage('todo')">To-Do List</button>
            <button onclick="showPage('calendar')">Calendrier</button>
        </div>
    </nav>

    <main id="app">
        <section id="tasks-page">
            <div class="header-action">
                <h2>Mes Tâches</h2>
                <button id="add-task-btn" class="btn-primary">Ajouter</button>
            </div>
            <div id="task-list" class="list-container">
                </div>
        </section>

        <section id="todo-page" style="display:none;">
            <div class="calendar-nav">
                <button id="btn-daily" class="bubble active" onclick="setTodoMode('daily')">Journalier</button>
                <button id="btn-weekly" class="bubble" onclick="setTodoMode('weekly')">Hebdo</button>
            </div>
            <h3 id="todo-today-date" style="text-align: center; color: var(--primary); margin-bottom: 20px;"></h3>
            <div id="todo-content">
                </div>
        </section>

        <section id="calendar-page" style="display:none;">
            <div class="calendar-nav">
                <button id="btn-year" class="bubble" onclick="setViewState('year')">Année</button>
                <button id="btn-month" class="bubble" onclick="setViewState('month')">Mois</button>
                <button id="btn-day" class="bubble active" onclick="setViewState('day')">Jours</button>
            </div>
            <div id="calendar-title" class="calendar-title"></div>
            <div class="calendar-wrapper">
                <div id="calendar-content">
                    </div>
            </div>
        </section>
    </main>

    <div id="task-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">Nouvelle Tâche</h3>
            <label>Nom de la tâche</label>
            <input type="text" id="task-name" placeholder="Ex: Appeler le garage...">
            <label>Date d'échéance</label>
            <input type="date" id="task-date">
            <label>Niveau d'importance</label>
            <select id="task-importance">
                <option value="high">Haute Importance</option>
                <option value="medium">Moyenne Importance</option>
                <option value="low">Faible Importance</option>
            </select>
            <div class="modal-buttons">
                <button id="save-task" class="btn-primary">Enregistrer</button>
                <button id="close-modal" class="btn-secondary">Annuler</button>
            </div>
        </div>
    </div>

    <div id="todo-modal" class="modal">
        <div class="modal-content">
            <h3>Ajouter au Planning</h3>
            <label>Heure de la tâche</label>
            <input type="time" id="todo-time">
            <label>Que devez-vous faire ?</label>
            <input type="text" id="todo-task-name" placeholder="Ex: Séance de sport">
            <div class="modal-buttons">
                <button id="save-todo" class="btn-primary">Ajouter</button>
                <button onclick="document.getElementById('todo-modal').style.display='none'" class="btn-secondary">Annuler</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
