<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4A90E2">
    <title>LIST'ME</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <h1>LIST'ME</h1>
        <div class="nav-links">
            <button onclick="showPage('tasks')">Tâches</button>
            <button onclick="showPage('calendar')">Calendrier</button>
        </div>
    </nav>

    <main id="app">
        <!-- Page Tâches -->
        <section id="tasks-page">
            <div class="header-action">
                <h2>Mes Tâches</h2>
                <button id="add-task-btn" class="btn-primary">+ Ajouter</button>
            </div>
            <div id="task-list" class="list-container"></div>
        </section>

        <!-- Page Calendrier -->
        <section id="calendar-page" style="display:none;">
            <h2>Calendrier</h2>
            <div class="calendar-wrapper">
                <div id="calendar-grid" class="calendar-grid"></div>
            </div>
        </section>
    </main>

    <!-- Modal -->
    <div id="task-modal" class="modal">
        <div class="modal-content">
            <h3>Nouvelle Tâche</h3>
            <label>Nom de la tâche</label>
            <input type="text" id="task-name" placeholder="Ex: Faire les courses">
            <label>Date</label>
            <input type="date" id="task-date">
            <label>Importance</label>
            <select id="task-importance">
                <option value="low">Faible</option>
                <option value="medium">Moyenne</option>
                <option value="high">Haute</option>
            </select>
            <div class="modal-buttons">
                <button id="save-task" class="btn-primary">Enregistrer</button>
                <button id="close-modal" class="btn-secondary">Annuler</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
