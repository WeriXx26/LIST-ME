<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <title>LIST'ME</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body class="theme-pink">

    <div id="toast-notification" class="toast-hidden"></div>

    <section id="auth-page" style="display: block;">
        <div class="auth-container">
            <h2>LIST'ME</h2>
            <div class="auth-form">
                <label>Adresse E-mail</label>
                <input type="email" id="auth-email" placeholder="votre@email.com">
                <label>Mot de passe</label>
                <input type="password" id="auth-pass" placeholder="••••••••">
                <button id="btn-login" class="btn-primary">Se connecter</button>
                <button id="btn-register" class="btn-secondary">Créer un compte</button>
            </div>
        </div>
    </section>

    <nav id="main-nav" style="display: none;">
        <button id="nav-btn-tasks" class="nav-bubble active" onclick="showPage('tasks')">📋 Tâches</button>
        <button id="nav-btn-todo" class="nav-bubble" onclick="showPage('todo')">⏱️ To-Do</button>
        <button id="nav-btn-calendar" class="nav-bubble" onclick="showPage('calendar')">📅 Calendrier</button>
        <button id="nav-btn-profile" class="nav-bubble" onclick="showPage('profile')">⚙️ Profil</button>
    </nav>

    <main>
        <section id="tasks-page" style="display: none;">
            <div class="header-zone">
                <h2>Mes Tâches</h2>
                <button id="add-task-btn" class="bubble-add">+</button>
            </div>
            <div class="sub-menu">
                <button id="sub-btn-active-tasks" class="sub-menu-tab active" onclick="switchTaskSubView('active')">En cours</button>
                <button id="sub-btn-archived-tasks" class="sub-menu-tab" onclick="switchTaskSubView('archive')">Archives</button>
            </div>
            <div class="filter-bar" id="tasks-action-bar">
                <select id="task-sort-filter" onchange="renderTasks()">
                    <option value="chrono">Ordre Chronologique</option>
                    <option value="creation">Date de création</option>
                </select>
            </div>
            <div id="task-list" class="list-container"></div>
        </section>

        <section id="todo-page" style="display: none;">
            <div class="header-zone">
                <h2 id="todo-today-date">To-Do List</h2>
                <div style="display:flex; gap:5px;">
                    <button id="btn-daily" class="bubble active" onclick="setTodoMode('daily')">Jour</button>
                    <button id="btn-weekly" class="bubble" onclick="setTodoMode('weekly')">Hebdo</button>
                </div>
            </div>
            <div id="todo-content"></div>
        </section>

        <section id="calendar-page" style="display: none;">
            <h2 id="calendar-title">Calendrier</h2>
            <div id="calendar-content"></div>
        </section>

        <section id="profile-page" style="display: none;">
            <h2>Mon Profil</h2>
            <div class="profile-card">
                <p>Mon compte : <span id="profile-user-email">...</span></p>
                <label>Mon Surnom</label>
                <input type="text" id="profile-nickname" placeholder="Ex: Max">
                <button id="btn-save-nickname" class="btn-primary" style="margin-top:10px; width:100%;">Enregistrer le surnom</button>
                <hr style="margin:20px 0; opacity:0.2;">
                <label>Thème de l'application</label>
                <div class="theme-selector" style="display:flex; gap:10px; margin-top:10px;">
                    <button class="theme-dot pink" onclick="changeTheme('pink')"></button>
                    <button class="theme-dot blue" onclick="changeTheme('blue')"></button>
                    <button class="theme-dot green" onclick="changeTheme('green')"></button>
                    <button class="theme-dot dark" onclick="changeTheme('dark')"></button>
                </div>
                <button id="btn-logout" class="btn-danger" style="margin-top:30px; width:100%;">Se déconnecter</button>
            </div>
        </section>
    </main>

    <div id="task-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">Nouvelle Tâche</h3>
            <label>Nom de la tâche</label>
            <input type="text" id="task-name" placeholder="Ex: Faire les courses">
            <label>Date</label>
            <input type="date" id="task-date">
            <label>Heure (Optionnel)</label>
            <input type="time" id="task-time">
            <label>Importance</label>
            <select id="task-importance">
                <option value="low">Faible</option>
                <option value="medium" selected>Moyenne</option>
                <option value="high">Haute</option>
            </select>
            <div class="modal-buttons">
                <button id="save-task" class="btn-primary">Enregistrer</button>
                <button id="close-modal" class="btn-secondary">Annuler</button>
            </div>
        </div>
    </div>

    <div id="todo-modal" class="modal">
        <div class="modal-content">
            <h3 id="todo-modal-title">Ajouter à la To-Do</h3>
            <div id="todo-day-selector-block" style="display:none; flex-direction:column; gap:5px; margin-bottom:10px;">
                <label>Jour de la semaine</label>
                <select id="todo-day-select">
                    <option value="1">Lundi</option>
                    <option value="2">Mardi</option>
                    <option value="3">Mercredi</option>
                    <option value="4">Jeudi</option>
                    <option value="5">Vendredi</option>
                    <option value="6">Samedi</option>
                    <option value="0">Dimanche</option>
                </select>
            </div>
            <label>Heure</label>
            <input type="time" id="todo-time">
            <label>Activité</label>
            <input type="text" id="todo-task-name" placeholder="Ex: Séance de sport">
            <div class="modal-buttons" style="display:flex; gap:10px; margin-top:15px;">
                <button id="save-todo" class="btn-primary" style="flex:1;">Ajouter</button>
                <button id="close-todo-modal" class="btn-secondary" style="flex:1;">Annuler</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
